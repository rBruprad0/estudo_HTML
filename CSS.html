<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de CSS</title>
    <style>
        body {
            background-color:   darkkhaki;
            font-family: 'Times New Roman', Times, serif;
            font-size: larger;
        }
        h1, h2, h3 {
            color:darkolivegreen;
            text-align: center;
        }
        p {
            color: rgb(70, 37, 10);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Hello Word!</h1>
    <h2>Hello Word!</h2>
    <h3>Hello Word!</h3>
    <p>Este é um parágrafo.</p>
</body>
</html>

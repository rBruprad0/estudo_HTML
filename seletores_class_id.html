<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de CSS</title>
    <style>
        body {
            background-color:   darkkhaki;
            font-family: 'Times New Roman', Times, serif;
            font-size: larger;
        }
        h1, h2, h3 {
            color:darkolivegreen;
            text-align: center;
        }
        p {
            color: rgb(70, 37, 10);
            font-weight: bold;
        }
        .hmarrom {
            color: rgb(70, 37, 10);
        }
        #h1marrom {
            font-size: medium;
        }
        .alinhatexto {
            text-align: start;

        }
    </style>
</head>
<body>
    <h1>Hello Word!</h1>
    <h1 id="h1marrom" class="hmarrom">Hello Word!</h1>
    <h2>Hello Word!</h2>
    <h3 class="hmarrom alinhatexto">Hello Word!</h3>
    <p>Este é um parágrafo.</p>
</body>
</html>

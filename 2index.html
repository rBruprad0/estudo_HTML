<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teoria em Prática - Tema 1</title>
</head>
<body>
    <h1>Biblioteca do Desenvolvedor</h1>
    <ul>
        <li><h2>Livro HTML na Prática!</h2></li>
        <li><strong>Autor:</strong> Anderson</li>
        <li><strong>Editora:</strong> Saber</li>
        <li><strong>Páginas:</strong> 400</li>
    </ul>
    <h2>Formulário para mensagens</h2>
    <form>
        <br/>
        <label>Nome:</label>
        <input type="text" placeholder="Nome">
        <br/><br/>
        <label>E-mail:</label>  
        <input type="text" placeholder="E-mail">
        <br/><br/>
        <label>Mensagem:</label>
        <textarea placeholder="Mensagem" rows="10" cols="18"></textarea>
    </form>

    <h2>Formulário (Tabela) para Mensagens</h2>
    <form>
        <table>
            <tr>
                <td><label for="Nome:"></label></td>
                <td><input type="text" placeholder="Nome"></td>
            </tr>
             <tr>
                <td><label for="E-mail"></label></td>
                <td><input type="text" placeholder="E-mail"></td>
            </tr>
             <tr>
                <td><label for="Mensagem:"></label></td>
                <td><textarea placeholder="Mensagem" rows="10" cols="22"></textarea><td></td>
            </tr>
        </table>
    </form>
</body>
</html>
